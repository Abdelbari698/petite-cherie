<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Airtable</title>
<style>
body{font-family:Arial,sans-serif;padding:20px;max-width:600px;margin:0 auto;background:#fdf0f3}
.box{background:white;border-radius:12px;padding:20px;margin:12px 0;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
button{background:#C2607A;color:white;padding:12px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;width:100%;margin:4px 0}
button.b2{background:#1a5276}
button.b3{background:#2e7d32}
pre{background:#f5f5f5;padding:12px;border-radius:8px;font-size:12px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;display:none}
.ok{background:#f0fff4;border:1px solid #b2dfdb}
.err{background:#fff0f0;border:1px solid #ffcccc}
</style>
</head>
<body>
<h2 style="color:#C2607A">🔧 تشخيص Airtable</h2>

<div class="box">
<button onclick="test1()">① اختبار الاتصال (GET)</button>
<pre id="r1"></pre>
</div>

<div class="box">
<button class="b2" onclick="test2()">② إرسال حقل واحد فقط (Reference)</button>
<pre id="r2"></pre>
</div>

<div class="box">
<button style="background:#8e44ad" onclick="test2b()">② ب — إيجاد اسم الهاتف تلقائياً</button>
<pre id="r2b"></pre>
</div>

<div class="box">
<button class="b3" onclick="test3()">③ إرسال كل الحقول</button>
<pre id="r3"></pre>
</div>

<div class="box">
<button style="background:#555" onclick="getFields()">④ عرض أسماء الأعمدة الحقيقية</button>
<pre id="r4"></pre>
</div>

<script>
const TOKEN = 'patVCLCnKHQ4b0qAe.3437a9824b6cab5718986642a2b83e0d986735b9703563d4c73bfce8d0f013fc';
const URL   = 'https://api.airtable.com/v0/app2WExX2KoZdDldq/tbloee4gwYyEushLP';
const HDR   = { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' };

function show(id, data, ok) {
  const el = document.getElementById(id);
  el.style.display = 'block';
  el.className = ok ? 'ok' : 'err';
  el.textContent = JSON.stringify(data, null, 2);
}

async function test1() {
  document.getElementById('r1').textContent = '⏳...';
  document.getElementById('r1').style.display = 'block';
  try {
    const r = await fetch(URL + '?maxRecords=1', { headers: HDR });
    const d = await r.json();
    show('r1', d, r.ok);
  } catch(e) { show('r1', {error: e.message}, false); }
}

async function test2() {
  document.getElementById('r2').textContent = '⏳...';
  document.getElementById('r2').style.display = 'block';
  try {
    const r = await fetch(URL, {
      method: 'POST', headers: HDR,
      body: JSON.stringify({ fields: { 'Reference': 'TEST-001' } })
    });
    const d = await r.json();
    show('r2', d, r.ok);
    if (r.ok && d.id) {
      // حذف السجل التجريبي فوراً
      await fetch(URL + '/' + d.id, { method: 'DELETE', headers: HDR });
    }
  } catch(e) { show('r2', {error: e.message}, false); }
}


async function test2b() {
  const el = document.getElementById('r2b');
  el.style.display = 'block';
  el.textContent = 'جاري البحث...';
  const variants = ['Telephone','Téléphone','Phone','Tel','Mobile','Tél'];
  let found = null;
  for (const name of variants) {
    const fields = {};
    fields['Reference'] = 'SCAN';
    fields[name] = '0600000000';
    try {
      const r = await fetch(URL, {method:'POST',headers:HDR,body:JSON.stringify({fields})});
      const d = await r.json();
      if (r.ok) {
        found = name;
        await fetch(URL+'/'+d.id, {method:'DELETE',headers:HDR});
        break;
      }
    } catch(e) {}
  }
  el.className = found ? 'ok' : 'err';
  el.textContent = found ? 'الاسم الصحيح: "' + found + '"' : 'لم يوجد — اضغط ④';
}

async function test3() {
  document.getElementById('r3').textContent = '⏳...';
  document.getElementById('r3').style.display = 'block';
  const id = 'TEST-' + Date.now().toString().slice(-4);
  try {
    const r = await fetch(URL, {
      method: 'POST', headers: HDR,
      body: JSON.stringify({ fields: {
        'Reference':       id,
        'Date':            new Date().toLocaleString('fr-DZ'),
        'Produit':         'اختبار',
        'Nom Client':      'اسم تجريبي',
        'Telephone':       '0600000000',
        'Wilaya':          'Setif',
        'Adresse':         'عنوان',
        'Mode Livraison':  'منزل',
        'Prix Produit':    '1000',
        'Frais Livraison': '200',
        'Totales':         '1200',
        'Message':         'test',
        'Categorie':       'test',
        'Statut':          'En attente'
      }})
    });
    const d = await r.json();
    show('r3', d, r.ok);
    if (r.ok && d.id) await fetch(URL + '/' + d.id, { method: 'DELETE', headers: HDR });
  } catch(e) { show('r3', {error: e.message}, false); }
}

async function getFields() {
  document.getElementById('r4').textContent = '⏳...';
  document.getElementById('r4').style.display = 'block';
  try {
    // أضف سجل بسيط لنرى الأعمدة
    const r1 = await fetch(URL, {
      method: 'POST', headers: HDR,
      body: JSON.stringify({ fields: { 'Reference': 'SCAN-001' } })
    });
    const d1 = await r1.json();
    
    if (!r1.ok) { show('r4', d1, false); return; }
    
    // اقرأ السجل لنرى كل الأعمدة
    const r2 = await fetch(URL + '?maxRecords=1', { headers: HDR });
    const d2 = await r2.json();
    
    const fields = d2.records?.length ? Object.keys(d2.records[0].fields) : [];
    
    // احذف السجل
    await fetch(URL + '/' + d1.id, { method: 'DELETE', headers: HDR });
    
    show('r4', {
      'الأعمدة الموجودة': fields,
      'عدد الأعمدة': fields.length
    }, true);
  } catch(e) { show('r4', {error: e.message}, false); }
}
</script>
</body>
</html>
