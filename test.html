<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Airtable</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial;padding:20px;background:#fdf0f3;max-width:640px;margin:0 auto}
h2{color:#C2607A;margin-bottom:16px}
.box{background:white;border-radius:12px;padding:16px;margin-bottom:12px}
button{background:#C2607A;color:white;padding:12px 20px;border:none;border-radius:8px;cursor:pointer;width:100%;font-size:14px;margin-bottom:8px;text-align:right;font-family:Arial}
button:hover{background:#a84e67}
button.g{background:#2e7d32}
button.b{background:#1a5276}
pre{background:#f5f5f5;padding:12px;border-radius:8px;font-size:11px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;margin-top:8px;display:none;max-height:300px;overflow-y:auto}
.ok{background:#f0fff4;border:1px solid #b2dfdb;color:#2e7d32}
.er{background:#fff0f0;border:1px solid #ffcccc;color:#c33}
.ld{background:#fff8e1;border:1px solid #ffe082;color:#856404}
</style>
</head>
<body>
<h2>🔧 تشخيص Airtable — Petite Chérie</h2>

<div class="box">
  <button onclick="t1()">① اختبار الاتصال</button>
  <pre id="r1"></pre>
</div>

<div class="box">
  <button class="b" onclick="t2()">② إرسال طلبية تجريبية كاملة</button>
  <pre id="r2"></pre>
</div>

<div class="box">
  <button class="g" onclick="t3()">③ عرض أسماء الأعمدة الموجودة</button>
  <pre id="r3"></pre>
</div>

<div class="box">
  <button style="background:#8e44ad" onclick="t4()">④ إرسال حقل حقل (تشخيص)</button>
  <pre id="r4"></pre>
</div>

<script>
var T = 'patVCLCnKHQ4b0qAe.3437a9824b6cab5718986642a2b83e0d986735b9703563d4c73bfce8d0f013fc';
var U = 'https://api.airtable.com/v0/app2WExX2KoZdDldq/tbloee4gwYyEushLP';
var H = {'Authorization':'Bearer '+T,'Content-Type':'application/json'};

function show(id, data, cls) {
  var el = document.getElementById(id);
  el.style.display = 'block';
  el.className = cls || '';
  el.textContent = JSON.stringify(data, null, 2);
}

async function req(method, body, id_suffix) {
  var url = id_suffix ? U+'/'+id_suffix : U;
  var opts = {method: method, headers: H};
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch(url, opts);
  var d = await r.json();
  return {ok: r.ok, status: r.status, data: d};
}

// ① اختبار الاتصال
async function t1() {
  var el = document.getElementById('r1');
  el.style.display='block'; el.className='ld'; el.textContent='⏳ جاري...';
  try {
    var r = await fetch(U+'?maxRecords=1', {headers:H});
    var d = await r.json();
    if (r.ok) {
      show('r1', {status:'✅ الاتصال ناجح', records: d.records.length}, 'ok');
    } else {
      show('r1', d, 'er');
    }
  } catch(e) { show('r1', {error: e.message}, 'er'); }
}

// ② إرسال طلبية كاملة
async function t2() {
  var el = document.getElementById('r2');
  el.style.display='block'; el.className='ld'; el.textContent='⏳ جاري الإرسال...';
  var fields = {
    'Reference':       'TEST-' + Date.now().toString().slice(-5),
    'Date':            new Date().toLocaleString('fr-DZ'),
    'Produit':         'فستان اختبار',
    'Nom Client':      'اسم تجريبي',
    'Telephone':       '0600000000',
    'Wilaya':          '19 - Setif',
    'Adresse':         'عنوان تجريبي',
    'Mode Livraison':  'إلى المنزل',
    'Prix Produit':    '2000',
    'Frais Livraison': '200',
    'Totales':         '2200',
    'Message':         'سجل اختبار',
    'Categorie':       'test',
    'Statut':          'En attente'
  };
  try {
    var r = await fetch(U, {method:'POST', headers:H, body:JSON.stringify({fields:fields})});
    var d = await r.json();
    if (r.ok) {
      show('r2', {status:'✅ تم الإرسال بنجاح! افتح Airtable لرؤية السجل', id: d.id}, 'ok');
      // حذف السجل التجريبي
      setTimeout(async function() {
        await fetch(U+'/'+d.id, {method:'DELETE', headers:H});
      }, 3000);
    } else {
      show('r2', {status:'❌ فشل', error: d.error}, 'er');
    }
  } catch(e) { show('r2', {error: e.message}, 'er'); }
}

// ③ أسماء الأعمدة الحقيقية
async function t3() {
  var el = document.getElementById('r3');
  el.style.display='block'; el.className='ld'; el.textContent='⏳ ...';
  try {
    // أضف سجل فارغ تقريباً
    var r1 = await fetch(U, {method:'POST', headers:H, body:JSON.stringify({fields:{'Reference':'SCAN-'+Date.now()}})});
    var d1 = await r1.json();
    if (!r1.ok) { show('r3', d1, 'er'); return; }
    
    // اقرأ الجدول
    var r2 = await fetch(U+'?maxRecords=3', {headers:H});
    var d2 = await r2.json();
    
    // احذف
    await fetch(U+'/'+d1.id, {method:'DELETE', headers:H});
    
    var allFields = new Set();
    (d2.records||[]).forEach(function(rec) {
      Object.keys(rec.fields||{}).forEach(function(k){ allFields.add(k); });
    });
    
    show('r3', {
      'الأعمدة': Array.from(allFields),
      'العدد': allFields.size
    }, allFields.size > 0 ? 'ok' : 'ld');
  } catch(e) { show('r3', {error:e.message}, 'er'); }
}

// ④ تشخيص حقل حقل
async function t4() {
  var el = document.getElementById('r4');
  el.style.display='block'; el.className='ld'; el.textContent='⏳ جاري اختبار كل حقل...';
  
  var allFields = {
    'Reference':       'TEST-DIAG',
    'Date':            '14/06/2026',
    'Produit':         'test',
    'Nom Client':      'test',
    'Telephone':       '0600000000',
    'Wilaya':          'test',
    'Adresse':         'test',
    'Mode Livraison':  'test',
    'Prix Produit':    '100',
    'Frais Livraison': '50',
    'Totales':         '150',
    'Message':         'test',
    'Categorie':       'test',
    'Statut':          'En attente'
  };
  
  var results = {};
  var failed = [];
  
  // جرب كل حقل على حدة
  for (var key of Object.keys(allFields)) {
    var f = {};
    f['Reference'] = 'D-' + Date.now() + '-' + Math.random().toString(36).slice(2,5);
    f[key] = allFields[key];
    try {
      var r = await fetch(U, {method:'POST', headers:H, body:JSON.stringify({fields:f})});
      var d = await r.json();
      if (r.ok) {
        results[key] = '✅ OK';
        await fetch(U+'/'+d.id, {method:'DELETE', headers:H});
      } else {
        results[key] = '❌ ' + (d.error && d.error.message || 'FAIL');
        failed.push(key + ' → ' + (d.error && d.error.message || ''));
      }
    } catch(e) {
      results[key] = '❌ ' + e.message;
      failed.push(key);
    }
    // تحديث النتيجة أثناء الاختبار
    el.textContent = JSON.stringify(results, null, 2);
  }
  
  el.className = failed.length ? 'er' : 'ok';
  show('r4', {
    'النتائج': results,
    'الحقول الفاشلة': failed.length ? failed : 'لا يوجد — كل الحقول صحيحة ✅'
  }, failed.length ? 'er' : 'ok');
}
</script>
</body>
</html>
