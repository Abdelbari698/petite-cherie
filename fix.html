<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>Fix Airtable</title>
<style>
body{font-family:Arial;padding:20px;background:#fdf0f3;max-width:500px;margin:0 auto}
h2{color:#C2607A;margin-bottom:16px}
button{background:#C2607A;color:white;padding:14px 20px;border:none;border-radius:8px;cursor:pointer;width:100%;font-size:16px;font-weight:bold;margin:4px 0}
pre{background:white;padding:12px;border-radius:8px;font-size:12px;margin-top:8px;white-space:pre-wrap;word-break:break-all;display:none;border:2px solid #ddd}
.ok{border-color:#25D366;background:#f0fff4;color:#2e7d32;display:block}
.er{border-color:#c33;background:#fff0f0;color:#c33;display:block}
</style>
</head>
<body>
<h2>🔧 إصلاح Airtable نهائياً</h2>
<button onclick="runFix()">▶ ابدأ الإصلاح التلقائي</button>
<pre id="log"></pre>

<script>
var TOKEN = 'patrOvY1LBs9ZRr56.82cb6639c48ec79d1140d9249c068a304eb85accc08c595494021f53822563c1';
var URL   = 'https://api.airtable.com/v0/app2WExX2KoZdDldq/tbloee4gwYyEushLP';
var H     = {'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'};

function log(msg, ok) {
  var el = document.getElementById('log');
  el.className = ok === false ? 'er' : 'ok';
  el.textContent += msg + '\n';
}

async function runFix() {
  var el = document.getElementById('log');
  el.textContent = '';
  el.style.display = 'block';
  el.className = '';
  
  log('① اختبار الاتصال...');
  
  // Step 1: Test connection
  try {
    var r = await fetch(URL + '?maxRecords=1', {headers: H});
    var d = await r.json();
    if (!r.ok) { log('❌ فشل: ' + JSON.stringify(d.error), false); return; }
    log('✅ الاتصال ناجح');
  } catch(e) { log('❌ ' + e.message, false); return; }
  
  log('\n② البحث عن أسماء الأعمدة الصحيحة...');
  
  // Step 2: Try each failing field with different name variants
  var fieldTests = {
    'phone':   ['Telephone','Tel','Phone','Mobile','Tél','téléphone','TELEPHONE'],
    'wilaya':  ['Wilaya','wilaya','WILAYA','Region','Région','Province'],
    'adresse': ['Adresse','adresse','Address','Adress','ADRESSE'],
    'message': ['Message','message','Notes','Note','Remarque','Comments'],
    'categorie':['Categorie','categorie','Category','Cat','Type'],
  };
  
  var found = {};
  
  for (var [key, variants] of Object.entries(fieldTests)) {
    for (var name of variants) {
      var f = {};
      f['Reference'] = 'FIX-' + key + '-' + Date.now();
      f[name] = 'test';
      try {
        var r = await fetch(URL, {method:'POST',headers:H,body:JSON.stringify({fields:f})});
        var d = await r.json();
        if (r.ok) {
          found[key] = name;
          log('✅ ' + key + ' → "' + name + '"');
          // delete test record
          await fetch(URL+'/'+d.id, {method:'DELETE',headers:H});
          break;
        } else if (d.error && d.error.type === 'UNKNOWN_FIELD_NAME') {
          // continue trying
        }
      } catch(e) {}
    }
    if (!found[key]) log('❌ ' + key + ': لم يوجد اسم صحيح');
  }
  
  log('\n③ إرسال طلبية كاملة بالأسماء الصحيحة...');
  
  // Step 3: Send full order with found names
  var fields = {
    'Reference':       'TEST-' + Date.now().toString().slice(-4),
    'Date':            new Date().toLocaleString('fr-DZ'),
    'Produit':         'فستان اختبار',
    'Nom Client':      'زبونة اختبار',
    'Mode Livraison':  'إلى المنزل',
    'Prix Produit':    '2000',
    'Frais Livraison': '200',
    'Totales':         '2200',
    'Statut':          'En attente'
  };
  
  // Add found fields
  if (found.phone)    fields[found.phone]    = '0600000000';
  if (found.wilaya)   fields[found.wilaya]   = 'Setif';
  if (found.adresse)  fields[found.adresse]  = 'عنوان تجريبي';
  if (found.message)  fields[found.message]  = 'اختبار';
  if (found.categorie) fields[found.categorie] = 'test';
  
  try {
    var r = await fetch(URL, {method:'POST',headers:H,body:JSON.stringify({fields:fields})});
    var d = await r.json();
    if (r.ok) {
      log('\n✅✅✅ نجح الإرسال الكامل!');
      log('ID: ' + d.id);
      log('\nالأسماء الصحيحة للأعمدة:');
      log(JSON.stringify(found, null, 2));
      log('\nانسخ هذه الأسماء وأرسلها!');
      el.className = 'ok';
      // delete test
      setTimeout(async function(){ await fetch(URL+'/'+d.id,{method:'DELETE',headers:H}); }, 5000);
    } else {
      log('❌ فشل: ' + JSON.stringify(d.error), false);
      el.className = 'er';
    }
  } catch(e) { log('❌ ' + e.message, false); }
}
</script>
</body>
</html>
